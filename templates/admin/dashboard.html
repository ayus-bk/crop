{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:#0f1710">
  <div style="width:100%;max-width:380px">

    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:36px;margin-bottom:8px">🛡</div>
      <h1 style="font-size:20px;font-weight:600;color:#e8f5d4">Admin panel</h1>
      <p style="font-size:13px;color:#7a9b6a;margin-top:4px">KrishiSathi — Superuser access</p>
    </div>

    <div style="background:#1a2e1a;border:1px solid #2d4a2d;border-radius:14px;padding:1.5rem">
      <form method="POST">
        <div class="field">
          <label style="color:#7a9b6a">Username</label>
          <input type="text" name="username" placeholder="admin" required autofocus
                 style="background:#0f1f10;border-color:#2d4a2d;color:#e8f5d4">
        </div>
        <div class="field">
          <label style="color:#7a9b6a">Password</label>
          <input type="password" name="password" placeholder="••••••••" required
                 style="background:#0f1f10;border-color:#2d4a2d;color:#e8f5d4">
        </div>
        <button type="submit" class="btn btn-full"
                style="background:#639922;color:#fff;border:none;margin-top:.5rem">
          Enter admin panel
        </button>
      </form>
    </div>

    <p style="text-align:center;font-size:12px;color:#4a6a3a;margin-top:1rem">
      <a href="/login" style="color:#4a6a3a;text-decoration:underline">← Back to farmer login</a>
    </p>
  </div>
</div>
{% endblock %}
